<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수행평가 관리자 페이지</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .admin-header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
            padding: 1rem 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }
        .assignment-list {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2rem;
        }
        .assignment-item {
            border: 1px solid #eee;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            display: flex;
            justify-content: between;
            align-items: center;
        }
        .assignment-info {
            flex: 1;
        }
        .assignment-actions {
            display: flex;
            gap: 0.5rem;
        }
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
        }
        .delete-btn:hover {
            background: #ee5a52;
        }
        .back-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <a href="/" class="back-btn">← 메인으로 돌아가기</a>
        
        <div class="admin-header">
            <h1>📋 수행평가 관리자 페이지</h1>
            <p>모든 수행평가를 확인하고 관리할 수 있습니다</p>
        </div>

        <div class="assignment-list">
            <h2>전체 수행평가 목록</h2>
            <div id="allAssignments">
                <!-- 수행평가 목록이 여기에 표시됩니다 -->
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
